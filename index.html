<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="브라우저에서 쉽고 정밀하게 실행되는 프리미엄 다크 모드 웹 메트로놈. Web Audio API를 활용한 박자 분할, 탭 템포 및 연습용 타이머를 탑재했습니다.">
  <meta name="keywords" content="메트로놈, 웹 메트로놈, metronome, web metronome, 탭 템포, 음악 연습, 템포 측정">
  <meta name="author" content="Antigravity">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Precision Web Metronome">
  <meta property="og:description" content="Web Audio API 기반의 정밀하고 감각적인 브라우저 메트로놈. 탭 템포, 타이머, 다양한 박자 및 분할 지원.">
  
  <title>고정밀 웹 메트로놈 (Precision Web Metronome)</title>
  
  <!-- Favicon (SVG) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>⏱️</text></svg>">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="app-container" id="metronome-app">
    <header>
      <h1>METRONOME</h1>
      <span class="badge" id="app-status">STANDBY</span>
    </header>

    <!-- Visualizer Panel -->
    <section class="visualizer-container" aria-label="시각 메트로놈 비주얼라이저">
      <div class="sweep-track" id="sweep-track">
        <div class="sweep-bar" id="sweep-bar"></div>
      </div>
      <div class="beat-indicators" id="beat-indicators" aria-live="polite">
        <!-- Dots will be dynamically generated by Javascript based on Time Signature -->
        <div class="beat-dot accent-active"></div>
        <div class="beat-dot"></div>
        <div class="beat-dot"></div>
        <div class="beat-dot"></div>
      </div>
    </section>

    <!-- BPM Display Panel -->
    <section class="bpm-display-container">
      <div class="bpm-number" id="bpm-display" tabindex="0" aria-label="분당 박자수">120</div>
      <div class="bpm-label">BPM</div>
      <div class="tempo-text" id="tempo-name">Moderato</div>
    </section>

    <!-- BPM Adjuster Slider & Buttons -->
    <section class="slider-container">
      <div class="speed-buttons">
        <button class="btn-speed" id="btn-sub-10" aria-label="10 BPM 감소">-10</button>
        <button class="btn-speed" id="btn-sub-1" aria-label="1 BPM 감소">-1</button>
        <input type="range" class="bpm-slider" id="bpm-range" min="40" max="250" value="120" step="1" aria-label="BPM 조절 슬라이더">
        <button class="btn-speed" id="btn-add-1" aria-label="1 BPM 증가">+1</button>
        <button class="btn-speed" id="btn-add-10" aria-label="10 BPM 증가">+10</button>
      </div>
    </section>

    <!-- Play & Tap Buttons -->
    <section class="controls-main">
      <button class="btn-play" id="btn-play" aria-label="메트로놈 시작/정지">
        <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:inline-block; vertical-align:middle; margin-right:4px;">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <svg id="stop-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none; vertical-align:middle; margin-right:4px;">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
        <span id="play-btn-text">START</span>
      </button>
      <button class="btn-tap" id="btn-tap" aria-label="탭 템포">
        <span>TAP</span>
        <span class="tap-indicator" id="tap-count">TAP TEMPO</span>
      </button>
    </section>

    <!-- Time Signature / Subdivisions Selector Group -->
    <section class="selector-group">
      <label class="selector-label">박자 (Time Signature)</label>
      <div class="segment-control" id="time-signature-control">
        <div class="segment-option" data-beats="2">2/4</div>
        <div class="segment-option" data-beats="3">3/4</div>
        <div class="segment-option active" data-beats="4">4/4</div>
        <div class="segment-option" data-beats="6">6/8</div>
      </div>
    </section>

    <section class="selector-group">
      <label class="selector-label">음표 분할 (Subdivisions)</label>
      <div class="segment-control" id="subdivision-control">
        <div class="segment-option active" data-sub="1">● (Quarter)</div>
        <div class="segment-option" data-sub="2">●● (8th)</div>
        <div class="segment-option" data-sub="3">●●● (Triplet)</div>
        <div class="segment-option" data-sub="4">●●●● (16th)</div>
      </div>
    </section>

    <!-- Tempo Name Presets -->
    <section class="preset-section">
      <label class="selector-label">템포 프리셋</label>
      <div class="preset-grid" id="preset-grid">
        <div class="preset-pill" data-bpm="60">Adagio (60)</div>
        <div class="preset-pill" data-bpm="80">Andante (80)</div>
        <div class="preset-pill active" data-bpm="120">Moderato (120)</div>
        <div class="preset-pill" data-bpm="140">Allegro (140)</div>
      </div>
    </section>

    <!-- Audio & Volume & Timer Settings -->
    <section class="settings-panel">
      <div class="settings-row">
        <label for="sound-select">소리 테마</label>
        <div class="sound-select-wrapper">
          <select id="sound-select" class="sound-select">
            <option value="woodblock">우드블록 (Woodblock)</option>
            <option value="digital">디지털 비프 (Beep)</option>
            <option value="drum">스네어 림샷 (Rimshot)</option>
          </select>
        </div>
      </div>

      <div class="settings-row">
        <label for="volume-slider">볼륨 조절</label>
        <div class="volume-control">
          <span class="volume-icon" id="volume-icon">🔊</span>
          <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="0.7">
        </div>
      </div>

      <div class="settings-row">
        <label>연습 타이머</label>
        <div class="timer-container" id="timer-presets">
          <div class="timer-pill active" data-time="0">무제한</div>
          <div class="timer-pill" data-time="60">1분</div>
          <div class="timer-pill" data-time="180">3분</div>
          <div class="timer-pill" data-time="300">5분</div>
          <span class="timer-countdown" id="timer-countdown">00:00</span>
        </div>
      </div>
    </section>

    <!-- Shortcuts info & helper -->
    <div class="shortcuts-info">
      <span><span class="key-badge">Space</span> 재생/정지</span>
      <span><span class="key-badge">T</span> 탭 템포</span>
      <span><span class="key-badge">↑/↓</span> BPM 조절</span>
    </div>
  </main>

  <footer>
    <p>Precision Web Metronome &copy; 2026</p>
  </footer>

  <!-- Application script -->
  <script src="app.js"></script>
</body>
</html>
